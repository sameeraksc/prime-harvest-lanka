<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Harvest Lanka — Coming Soon</title>
<meta name="description" content="Prime Harvest Lanka — rooted in nature, driven by innovation. Our agribusiness is taking root. Launching soon.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#1B4332;
    --field:#4F7942;
    --gold:#D6A237;
    --sky:#C9E6F5;
    --paper:#FBF8F2;
    --ink:#16231A;
    --ink-soft:#3E4A3F;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Public Sans', sans-serif;
    overflow-x:hidden;
  }

  a{color:inherit;}

  :focus-visible{
    outline:2px solid var(--forest);
    outline-offset:3px;
    border-radius:3px;
  }

  .page{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:7vh 1.5rem 0;
    overflow:hidden;
  }

  /* ---------- texture: faint paper grain via repeating dots ---------- */
  .page::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(circle, rgba(27,67,50,0.045) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events:none;
  }

  .content{
    position:relative;
    z-index:2;
    max-width:640px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .logo{
    width:96px;
    height:96px;
    object-fit:contain;
    margin-bottom:1.6rem;
    filter:drop-shadow(0 6px 14px rgba(27,67,50,0.18));
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--field);
    margin:0 0 1.1rem;
    display:flex;
    align-items:center;
    gap:0.6em;
  }

  .eyebrow .dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--gold);
    display:inline-block;
    animation:pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(0.7); }
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(2.1rem, 6vw, 3.6rem);
    line-height:1.08;
    letter-spacing:-0.01em;
    margin:0 0 1.1rem;
    color:var(--forest);
  }

  h1 em{
    font-style:italic;
    color:var(--gold);
    font-weight:500;
  }

  .lede{
    font-size:1.05rem;
    line-height:1.65;
    color:var(--ink-soft);
    max-width:480px;
    margin:0 0 2.4rem;
  }

  .lede strong{
    color:var(--forest);
    font-weight:600;
  }

  /* ---------- contact card ---------- */
  .contact{
    display:flex;
    align-items:center;
    gap:0.6rem;
    background:#fff;
    border:1px solid rgba(27,67,50,0.14);
    border-radius:999px;
    padding:0.55rem 0.55rem 0.55rem 1.2rem;
    box-shadow:0 8px 24px rgba(27,67,50,0.07);
    margin-bottom:0.9rem;
  }

  .contact a{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.88rem;
    text-decoration:none;
    color:var(--forest);
    letter-spacing:0.01em;
  }

  .copy-btn{
    font-family:'Public Sans', sans-serif;
    font-size:0.78rem;
    font-weight:600;
    background:var(--forest);
    color:var(--paper);
    border:none;
    border-radius:999px;
    padding:0.5rem 0.95rem;
    cursor:pointer;
    transition:background 0.18s ease, transform 0.18s ease;
    white-space:nowrap;
  }

  .copy-btn:hover{ background:#143728; }
  .copy-btn:active{ transform:scale(0.96); }

  .copy-btn[data-state="copied"]{ background:var(--field); }

  .meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:rgba(22,35,26,0.45);
    margin-bottom:3vh;
  }

  /* ---------- signature: furrowed horizon with rising sun ---------- */
  .horizon{
    position:relative;
    width:100%;
    margin-top:auto;
    line-height:0;
  }

  .horizon svg{
    display:block;
    width:100%;
    height:auto;
  }

  .sun{
    transform-origin:center;
    animation:rise 7s ease-in-out infinite alternate;
  }

  @keyframes rise{
    from{ transform:translateY(6px); opacity:0.85; }
    to{ transform:translateY(-4px); opacity:1; }
  }

  .stalk{
    transform-origin:bottom center;
    animation:sway 5.5s ease-in-out infinite;
  }
  .stalk.s2{ animation-delay:-1.8s; }
  .stalk.s3{ animation-delay:-3.4s; }

  @keyframes sway{
    0%, 100%{ transform:rotate(-1.4deg); }
    50%{ transform:rotate(1.6deg); }
  }

  @media (prefers-reduced-motion: reduce){
    .sun, .stalk, .eyebrow .dot{ animation:none; }
  }

  @media (max-width:520px){
    .page{ padding-top:6vh; }
    .logo{ width:78px; height:78px; }
    .contact{ flex-direction:column; align-items:stretch; border-radius:18px; padding:0.9rem; gap:0.7rem; }
    .contact a{ text-align:center; }
    .copy-btn{ width:100%; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="content">
    <img class="logo" src="logo.png" alt="Prime Harvest Lanka logo">

    <p class="eyebrow"><span class="dot"></span>Field notes &middot; Sri Lanka</p>

    <h1>Something is<br><em>taking root.</em></h1>

    <p class="lede">
      <strong>Prime Harvest Lanka</strong> is a new agribusiness growing out of Sri Lanka's soil —
      rooted in nature, driven by innovation. Our site is still in the ground. Reach out while we get it ready.
    </p>

    <div class="contact">
      <a href="mailto:hello@primeharvestlanka.lk" id="emailLink">hello@primeharvestlanka.lk</a>
      <button class="copy-btn" id="copyBtn" type="button">Copy</button>
    </div>

    <p class="meta">Est. 2026 — Launching this season</p>
  </div>

  <div class="horizon" aria-hidden="true">
    <svg viewBox="0 0 1280 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="sun" cx="1040" cy="70" r="46" fill="#D6A237" opacity="0.9"/>
      <circle cx="1040" cy="70" r="70" fill="#D6A237" opacity="0.12"/>

      <path class="stalk s1" d="M120 260 C118 200 100 170 108 120 C112 145 124 150 122 120 C128 142 138 146 134 118 C140 138 150 140 146 114 C150 132 158 134 154 110" stroke="#D6A237" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path class="stalk s2" d="M178 260 C176 215 162 190 168 150 C171 170 181 173 179 150 C184 168 192 170 189 148 C194 164 202 166 199 146" stroke="#D6A237" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path class="stalk s3" d="M90 260 C92 222 80 200 86 168 C89 184 97 186 95 167 C99 181 106 183 104 165" stroke="#D6A237" stroke-width="3" fill="none" stroke-linecap="round"/>

      <path d="M0 200 C 220 150, 420 240, 680 170 C 900 115, 1080 190, 1280 150 L1280 260 L0 260 Z" fill="#A9C98C" opacity="0.55"/>
      <path d="M0 215 C 260 175, 480 250, 740 195 C 960 150, 1100 210, 1280 180 L1280 260 L0 260 Z" fill="#4F7942" opacity="0.7"/>
      <path d="M0 235 C 300 205, 520 255, 800 220 C 1000 195, 1140 230, 1280 215 L1280 260 L0 260 Z" fill="#1B4332"/>
    </svg>
  </div>
</div>

<script>
  const btn = document.getElementById('copyBtn');
  const email = 'hello@primeharvestlanka.lk';
  btn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(email);
      btn.textContent = 'Copied';
      btn.dataset.state = 'copied';
      setTimeout(() => { btn.textContent = 'Copy'; btn.dataset.state = ''; }, 1800);
    }catch(e){
      window.location.href = 'mailto:' + email;
    }
  });
</script>

</body>
</html>
